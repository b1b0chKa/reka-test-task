version: "3.8"

services:
  app:
    build:
      context: .
    container_name: reka-app
    working_dir: /var/www
    volumes:
      - ./:/var/www
    depends_on:
      - db

  nginx:
    image: nginx:alpine
    container_name: reka-nginx
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  db:
    image: mysql:8
    container_name: reka-db
    restart: always
    environment:
      MYSQL_DATABASE: reka
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
